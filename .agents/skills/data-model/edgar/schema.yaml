# Dataset schema for SEC EDGAR structured data extraction.
#
# Edgar is a structured source — all entities, properties, and relationships
# are built deterministically by the atomizer from SEC API data (XBRL, JSON,
# HTML/XML filings). There is no LLM extraction, so all elements are passive
# and no extraction_config is used.
#
# XBRL financial properties (~40 concepts) are defined in the field map
# (fetchlib/edgar_field_map.go XBRLConceptMappings) and validated against the
# KG schema. Only the most commonly queried XBRL properties are listed here;
# the full set is authoritative in the field map.
name: "sec"
description: "SEC EDGAR filings: company registrations, XBRL financial facts, insider ownership, institutional holdings, and corporate events"

extraction:
  flavors: closed
  properties: closed
  relationships: closed
  attributes: open

# =============================================================================
# FLAVORS
# =============================================================================

flavors:
  - name: "organization"
    description: "A particular business, institution, or organization such as a corporation, university, government agency, or non-profit"
    display_name: "Organization"
    mergeability: not_mergeable
    # lei, crd_number, sec_file_number, and pcaob_number let us merge N-CEN
    # service providers (custodians, investment advisers, transfer agents,
    # auditors, etc.) across filings even when the SEC doesn't assign them a
    # CIK. pcaob_number is auditor-specific and is the canonical fallback for
    # PCAOB-registered audit firms whose filer didn't supply an LEI. crd_number
    # carries the firm-level FINRA CRD here; the same property on person
    # carries the individual CRD — the flavor scopes the namespace.
    strong_id_properties: ["company_cik", "lei", "pcaob_number", "crd_number", "sec_file_number"]
    passive: true

  - name: "10_k"
    namespace: "sec"
    description: "Annual report filing (Form 10-K)"
    display_name: "10-K"
    mergeability: not_mergeable
    strong_id_properties: ["accession_number"]
    passive: true

  - name: "10_q"
    namespace: "sec"
    description: "Quarterly report filing (Form 10-Q)"
    display_name: "10-Q"
    mergeability: not_mergeable
    strong_id_properties: ["accession_number"]
    passive: true

  - name: "20_f"
    namespace: "sec"
    description: "Foreign private issuer annual report (Form 20-F)"
    display_name: "20-F"
    mergeability: not_mergeable
    strong_id_properties: ["accession_number"]
    passive: true

  - name: "8_k"
    namespace: "sec"
    description: "Current report filing (Form 8-K)"
    display_name: "8-K"
    mergeability: not_mergeable
    strong_id_properties: ["accession_number"]
    passive: true

  - name: "form_3"
    namespace: "sec"
    description: "Initial statement of beneficial ownership"
    display_name: "Form 3"
    mergeability: not_mergeable
    strong_id_properties: ["accession_number"]
    passive: true

  - name: "form_4"
    namespace: "sec"
    description: "Statement of changes in beneficial ownership"
    display_name: "Form 4"
    mergeability: not_mergeable
    strong_id_properties: ["accession_number"]
    passive: true

  - name: "sc_13d"
    namespace: "sec"
    description: "Beneficial ownership report (activist)"
    display_name: "SC 13D"
    mergeability: not_mergeable
    strong_id_properties: ["accession_number"]
    passive: true

  - name: "sc_13g"
    namespace: "sec"
    description: "Beneficial ownership report (passive)"
    display_name: "SC 13G"
    mergeability: not_mergeable
    strong_id_properties: ["accession_number"]
    passive: true

  - name: "13f_hr"
    namespace: "sec"
    description: "Institutional investment manager holdings report"
    display_name: "13F-HR"
    mergeability: not_mergeable
    strong_id_properties: ["accession_number"]
    passive: true

  - name: "def_14a"
    namespace: "sec"
    description: "Definitive proxy statement"
    display_name: "DEF 14A"
    mergeability: not_mergeable
    strong_id_properties: ["accession_number"]
    passive: true

  - name: "6_k"
    namespace: "sec"
    description: "Foreign private issuer current report (Form 6-K)"
    display_name: "6-K"
    mergeability: not_mergeable
    strong_id_properties: ["accession_number"]
    passive: true

  - name: "40_f"
    namespace: "sec"
    description: "Canadian cross-border annual report (Form 40-F)"
    display_name: "40-F"
    mergeability: not_mergeable
    strong_id_properties: ["accession_number"]
    passive: true

  - name: "nport_p"
    namespace: "sec"
    description: "Monthly portfolio investments report (Form N-PORT) for a registered investment company"
    display_name: "N-PORT"
    mergeability: not_mergeable
    strong_id_properties: ["accession_number"]
    passive: true

  - name: "ncen"
    namespace: "sec"
    description: "Annual report (Form N-CEN) for a registered investment company capturing fund structure, service providers, and operational data"
    display_name: "N-CEN"
    mergeability: not_mergeable
    strong_id_properties: ["accession_number"]
    passive: true

  - name: "form_d"
    namespace: "sec"
    description: "Regulation D offering notice (Form D or D/A) filed with the SEC to claim an exemption from registration for a private placement. Covers VC/PE funds, hedge funds, and operating company raises."
    display_name: "Form D"
    mergeability: not_mergeable
    strong_id_properties: ["accession_number"]
    passive: true

  - name: "s_4"
    namespace: "sec"
    description: "Registration statement (Form S-4) filed to register securities issued in connection with a business combination, merger, or acquisition."
    display_name: "S-4"
    mergeability: not_mergeable
    strong_id_properties: ["accession_number"]
    passive: true

  - name: "valuation_method_change"
    namespace: "sec"
    description: "A material change to fund valuation methodology disclosed under N-CEN Item B.20. Each entity records one valuationMethodsChange record (date, asset type, regulatory basis, free-text explanation) and links to the disclosing N-CEN filing plus any per-series fund(s) affected."
    display_name: "Valuation Method Change"
    mergeability: not_mergeable
    strong_id_properties: ["valuation_change_id"]
    passive: true

  - name: "filing"
    namespace: "sec"
    description: "SEC filing (generic, for form types without a specific modeled flavor)"
    display_name: "SEC Filing"
    mergeability: not_mergeable
    strong_id_properties: ["accession_number"]
    passive: true

  - name: "person"
    description: "A real person as opposed to a fictional character, such as a CEO, politician, or public figure. Also used for individual registered broker-dealer representatives identified by their FINRA CRD number."
    display_name: "Person"
    mergeability: not_mergeable
    # crd_number is FINRA's individual Central Registration Depository
    # identifier, disclosed for fund directors and chief compliance officers
    # on N-CEN. Adding it as a strong ID lets the same person merge across
    # all the registrants (and historical filings) where they're disclosed.
    # The same crd_number property exists on organization (for firm-level
    # CRDs) — flavor scoping prevents cross-namespace collisions.
    strong_id_properties: ["person_cik", "crd_number"]
    passive: true

  - name: "financial_instrument"
    description: "A specific asset that can be traded, such as a stock, ETF, bond, CD, or fund. Companies are organizations, NOT financial instruments. Specific currency amounts are NOT financial instruments."
    display_name: "Financial Instrument"
    mergeability: not_mergeable
    strong_id_properties: ["cusip_number", "holding_isin", "series_id", "series_lei", "nport_holding_id"]
    passive: true

  - name: "industry"
    description: "A Standard Industrial Classification (SIC) industry category assigned by the SEC"
    display_name: "Industry"
    mergeability: not_mergeable
    strong_id_properties: ["sic_code"]
    passive: true

# =============================================================================
# PROPERTIES — Organization
# =============================================================================

